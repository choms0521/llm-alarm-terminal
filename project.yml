name: ClaudeAlarmTerminal
options:
  bundleIdPrefix: com.choms0521
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: ko
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  AnyCodable:
    url: https://github.com/Flight-School/AnyCodable
    from: "0.6.7"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "YES"
    ENABLE_HARDENED_RUNTIME: "YES"
    DEAD_CODE_STRIPPING: "YES"

targets:
  ClaudeAlarmTerminal:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/ClaudeAlarmTerminal
      - path: Sources/TerminalView
      - path: Sources/PTY
      - path: Sources/Session
      - path: Sources/Lifecycle
      - path: Sources/Workspace
      - path: Sources/UI
    resources:
      - path: Resources
        excludes:
          - Info.plist
          - ClaudeAlarmTerminal.entitlements
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Claude Alarm Terminal
        CFBundleName: ClaudeAlarmTerminal
        CFBundleIdentifier: com.choms0521.ClaudeAlarmTerminal
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        LSApplicationCategoryType: public.app-category.developer-tools
    entitlements:
      path: Resources/ClaudeAlarmTerminal.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - sdk: IOSurface.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: CoreText.framework
      - sdk: CoreGraphics.framework
      - sdk: QuartzCore.framework
      - sdk: AVFoundation.framework
      - sdk: UserNotifications.framework
      - package: AnyCodable
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.choms0521.ClaudeAlarmTerminal
        PRODUCT_NAME: ClaudeAlarmTerminal
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ClaudeAlarmTerminal.entitlements
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
        OTHER_LDFLAGS: "-lc++"
        CLANG_CXX_LIBRARY: libc++
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
        SWIFT_INCLUDE_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          OTHER_SWIFT_FLAGS: "-D DEBUG"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"

  PTYVerifier:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/PTY
      - path: Sources/PTYVerifier
    settings:
      base:
        PRODUCT_NAME: pty-verifier
        CODE_SIGN_STYLE: Manual
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
        SWIFT_INCLUDE_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "-"

  SessionVerifier:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/PTY
      - path: Sources/Session
      - path: Sources/Lifecycle
      - path: Sources/Workspace
      - path: Sources/UI
        excludes:
          - "Pane/**"
      - path: Sources/SessionVerifier
    dependencies:
      - package: AnyCodable
    settings:
      base:
        PRODUCT_NAME: session-verifier
        CODE_SIGN_STYLE: Manual
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
        SWIFT_INCLUDE_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "-"

  GhostBridgeVerifier:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/GhostBridgeVerifier
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - sdk: IOSurface.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: CoreText.framework
      - sdk: CoreGraphics.framework
      - sdk: QuartzCore.framework
      - sdk: AVFoundation.framework
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_NAME: ghost-bridge-verifier
        CODE_SIGN_STYLE: Manual
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
        OTHER_LDFLAGS: "-lc++"
        CLANG_CXX_LIBRARY: libc++
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "-"

  WorkspaceTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Session
      - path: Sources/PTY
      - path: Sources/Lifecycle
      - path: Sources/Workspace
      - path: Sources/UI
        excludes:
          - "Pane/**"
      - path: Tests/WorkspaceTests
    dependencies:
      - package: AnyCodable
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.choms0521.ClaudeAlarmTerminal.WorkspaceTests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Manual
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
        SWIFT_INCLUDE_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "-"

  SessionTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/PTY
      - path: Sources/Session
      - path: Sources/Lifecycle
      - path: Sources/Workspace
      - path: Sources/UI
        excludes:
          - "Pane/**"
      - path: Tests/SessionTests
    dependencies:
      - package: AnyCodable
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.choms0521.ClaudeAlarmTerminal.SessionTests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Manual
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
        SWIFT_INCLUDE_PATHS:
          - "$(SRCROOT)/Sources/PTY/include"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "-"

schemes:
  PTYVerifier:
    build:
      targets:
        PTYVerifier: all
    run:
      config: Debug
  SessionVerifier:
    build:
      targets:
        SessionVerifier: all
    run:
      config: Debug
  ClaudeAlarmTerminal:
    build:
      targets:
        ClaudeAlarmTerminal: all
    run:
      config: Debug
    archive:
      config: Release
  GhostBridgeVerifier:
    build:
      targets:
        GhostBridgeVerifier: all
    run:
      config: Debug
  WorkspaceTests:
    build:
      targets:
        WorkspaceTests: test
    test:
      config: Debug
      targets:
        - WorkspaceTests
  SessionTests:
    build:
      targets:
        SessionTests: test
    test:
      config: Debug
      targets:
        - SessionTests
